GITHUB_OWNER = "WpBaselineApp"
GITHUB_REPO = "WPLaunchGuard"
GITHUB_WORKFLOW_FILE = "baseline-scan.yml"
GITHUB_REF = "main"
STRIPE_PRICE_ID_STARTER = "price_1T7MycIfnuQp2OJpzQOZQMPQ"
STRIPE_PRICE_ID_GROWTH = "price_1T7MyvIfnuQp2OJpiDtlPhvn"
STRIPE_PRICE_ID_AGENCY = "price_1T7Mz9IfnuQp2OJpMJjFFbFK"

[[d1_databases]]
binding = "DB"
database_name = "baseline-db-dev"
