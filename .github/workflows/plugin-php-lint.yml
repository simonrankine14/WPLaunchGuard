name: Plugin PHP Lint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"

      - name: Lint Baseline plugin PHP
        shell: bash
        run: |
          set -euo pipefail
          find wordpress-plugin/baseline -name '*.php' -print0 | xargs -0 -n1 php -l
