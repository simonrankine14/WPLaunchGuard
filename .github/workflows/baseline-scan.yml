name: Baseline Scan Runner

on:
  workflow_dispatch:
    inputs:
      scan_id:
        description: "Scan ID from Baseline API"
        required: true
        type: string
      site_id:
        description: "Site ID (for traceability)"
        required: false
        default: ""
        type: string
      site_url:
        description: "Base site URL for crawl/discovery context"
        required: false
        default: ""
        type: string
      client_name:
        description: "Client slug used for report folder names"
        required: true
        type: string
      client_label:
        description: "Human-readable site/client label for report header"
        required: false
        default: ""
        type: string
      profile:
        description: "QA profile"
        required: true
        default: "client-safe"
        type: choice
        options:
          - client-safe
          - engineering-deep
      single_url:
        description: "Optional single URL override"
        required: false
        default: ""
        type: string
      target_url:
        description: "Explicit target URL for page-level scans"
        required: false
        default: ""
        type: string
      sitemap_url:
        description: "Optional sitemap URL"
        required: false
        default: ""
        type: string
      form_mode:
        description: "Form submit mode"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - live
      evidence_enabled:
        description: "Capture screenshots for issue evidence"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      lighthouse_enabled:
        description: "Run Lighthouse audits"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      quick_scan_enabled:
        description: "Use reduced project set for faster scans"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      responsive_enabled:
        description: "Include mobile/tablet projects"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      viewport_preset:
        description: "Device classes to test"
        required: false
        default: "desktop"
        type: choice
        options:
          - desktop
          - mobile
          - both
      pdf_export_enabled:
        description: "Generate client PDF export"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      zip_export_enabled:
        description: "Generate evidence ZIP export"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      brand_name:
        description: "Brand display name for report shell"
        required: false
        default: ""
        type: string
      brand_logo_url:
        description: "Brand logo URL for report shell"
        required: false
        default: ""
        type: string
      brand_primary_color:
        description: "Primary theme color (hex)"
        required: false
        default: "#2f86c3"
        type: string
      brand_accent_color:
        description: "Accent theme color (hex)"
        required: false
        default: "#34b3a0"
        type: string
      brand_footer_text:
        description: "Footer text for report shell"
        required: false
        default: ""
        type: string
      hide_baseline_branding:
        description: "Hide Baseline name in report chrome"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      callback_url:
        description: "Callback URL (optional override)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Restore previous history snapshot from Cloudflare R2
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          REPORTS_R2_BUCKET: baseline-reports-dev
        run: |
          set +e
          HISTORY_DIR="reports/.history/${{ inputs.client_name }}"
          HISTORY_FILE="${HISTORY_DIR}/issues.previous.json"
          HISTORY_KEY="history/${{ inputs.client_name }}/issues.previous.json"
          mkdir -p "$HISTORY_DIR"

          if [[ -z "$CLOUDFLARE_API_TOKEN" || -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "History restore skipped: missing Cloudflare secrets."
            exit 0
          fi

          if npx wrangler r2 object get "${REPORTS_R2_BUCKET}/${HISTORY_KEY}" \
            --file "$HISTORY_FILE" \
            --remote \
            --config services/api-worker/wrangler.toml >/dev/null 2>&1; then
            echo "Restored history snapshot: ${HISTORY_KEY}"
          else
            rm -f "$HISTORY_FILE"
            echo "No previous history snapshot found."
          fi

      - name: Run QA
        id: run_qa
        shell: bash
        env:
          CALLBACK_SECRET_URL: ${{ secrets.BASELINE_CALLBACK_URL != '' && secrets.BASELINE_CALLBACK_URL || secrets.LAUNCHGUARD_CALLBACK_URL }}
          CALLBACK_SECRET_TOKEN: ${{ secrets.BASELINE_CALLBACK_TOKEN != '' && secrets.BASELINE_CALLBACK_TOKEN || secrets.LAUNCHGUARD_CALLBACK_TOKEN }}
        run: |
          set +e
          normalize_bool() {
            local value
            value=$(echo "${1:-}" | tr '[:upper:]' '[:lower:]' | xargs)
            case "$value" in
              1|true|yes|on) echo "true" ;;
              *) echo "false" ;;
            esac
          }

          EVIDENCE_ENABLED=$(normalize_bool "${{ inputs.evidence_enabled }}")
          LIGHTHOUSE_ENABLED=$(normalize_bool "${{ inputs.lighthouse_enabled }}")
          QUICK_ENABLED=$(normalize_bool "${{ inputs.quick_scan_enabled }}")
          RESPONSIVE_ENABLED=$(normalize_bool "${{ inputs.responsive_enabled }}")
          VIEWPORT_PRESET=$(echo "${{ inputs.viewport_preset }}" | tr '[:upper:]' '[:lower:]' | xargs)
          case "$VIEWPORT_PRESET" in
            desktop|mobile|both) ;;
            *) VIEWPORT_PRESET="desktop" ;;
          esac
          if [[ "$RESPONSIVE_ENABLED" != "true" ]]; then
            VIEWPORT_PRESET="desktop"
          fi

          SCREENSHOTS_MODE="issues"
          if [[ "$EVIDENCE_ENABLED" != "true" ]]; then
            SCREENSHOTS_MODE="off"
          fi

          SKIP_LIGHTHOUSE_FLAG="false"
          if [[ "$LIGHTHOUSE_ENABLED" != "true" ]]; then
            SKIP_LIGHTHOUSE_FLAG="true"
          fi

          DESKTOP_PROJECTS=(chrome-desktop-1920 windows-laptop-1272)
          MOBILE_PROJECTS=(iphone-14 ipad)
          PROJECTS=()

          append_project_set() {
            local class_name="$1"
            if [[ "$class_name" == "desktop" ]]; then
              if [[ "$QUICK_ENABLED" == "true" ]]; then
                PROJECTS+=("${DESKTOP_PROJECTS[0]}")
              else
                PROJECTS+=("${DESKTOP_PROJECTS[@]}")
              fi
              return
            fi
            if [[ "$class_name" == "mobile" ]]; then
              if [[ "$QUICK_ENABLED" == "true" ]]; then
                PROJECTS+=("${MOBILE_PROJECTS[0]}")
              else
                PROJECTS+=("${MOBILE_PROJECTS[@]}")
              fi
            fi
          }

          if [[ "$VIEWPORT_PRESET" == "mobile" ]]; then
            append_project_set "mobile"
          elif [[ "$VIEWPORT_PRESET" == "both" ]]; then
            append_project_set "desktop"
            append_project_set "mobile"
          else
            append_project_set "desktop"
          fi

          if [[ "${#PROJECTS[@]}" -eq 0 ]]; then
            PROJECTS=("${DESKTOP_PROJECTS[@]}")
          fi
          PROJECT_COUNT="${#PROJECTS[@]}"
          if [[ "$PROJECT_COUNT" -lt 1 ]]; then
            PROJECT_COUNT=1
          fi
          PROGRESS_PROJECT="${PROJECTS[0]}"
          URL_LIMIT="60"
          if [[ "$QUICK_ENABLED" == "true" ]]; then
            URL_LIMIT="35"
          elif [[ "$VIEWPORT_PRESET" == "both" ]]; then
            URL_LIMIT="40"
          fi

          PROJECTS_CSV=$(IFS=,; echo "${PROJECTS[*]}")
          REST_BASE_INPUT="${{ inputs.site_url }}"
          TARGET_SINGLE="${{ inputs.target_url }}"
          if [[ -z "$TARGET_SINGLE" && -z "$REST_BASE_INPUT" ]]; then
            TARGET_SINGLE="${{ inputs.single_url }}"
          fi
          CLIENT_LABEL_INPUT="${{ inputs.client_label }}"
          if [[ -z "$CLIENT_LABEL_INPUT" ]]; then
            CLIENT_LABEL_INPUT="$REST_BASE_INPUT"
          fi

          echo "selected_projects=$PROJECTS_CSV" >> "$GITHUB_OUTPUT"
          echo "effective_target_url=$TARGET_SINGLE" >> "$GITHUB_OUTPUT"
          echo "effective_evidence_enabled=$EVIDENCE_ENABLED" >> "$GITHUB_OUTPUT"
          echo "effective_lighthouse_enabled=$LIGHTHOUSE_ENABLED" >> "$GITHUB_OUTPUT"
          echo "effective_quick_scan_enabled=$QUICK_ENABLED" >> "$GITHUB_OUTPUT"
          echo "effective_responsive_enabled=$RESPONSIVE_ENABLED" >> "$GITHUB_OUTPUT"
          echo "effective_viewport_preset=$VIEWPORT_PRESET" >> "$GITHUB_OUTPUT"
          echo "effective_progress_project=$PROGRESS_PROJECT" >> "$GITHUB_OUTPUT"
          echo "forced_final_status=" >> "$GITHUB_OUTPUT"
          echo "forced_run_state=" >> "$GITHUB_OUTPUT"

          CMD=(npm run qa -- "${{ inputs.client_name }}" "--projects=${PROJECTS_CSV}" "--workers=1")
          if [[ -n "$TARGET_SINGLE" ]]; then
            CMD+=("--single=$TARGET_SINGLE")
          fi
          if [[ -n "${{ inputs.sitemap_url }}" ]]; then
            CMD+=("--sitemap=${{ inputs.sitemap_url }}")
          fi

          export QA_PROFILE="${{ inputs.profile }}"
          export FORM_SUBMIT_MODE="${{ inputs.form_mode }}"
          export SCREENSHOTS_MODE="$SCREENSHOTS_MODE"
          export SCREENSHOTS_LIMIT=4
          export SKIP_LIGHTHOUSE="$SKIP_LIGHTHOUSE_FLAG"
          export LINK_CHECK_TIMEOUT_MS=20000
          export LINK_CHECK_RETRIES=1
          export LINK_CHECK_RETRY_BACKOFF_MS=500
          export LINK_CHECK_CONCURRENCY=2
          export QA_URL_LIMIT="$URL_LIMIT"
          export URL_PACE_MS=400
          export LAUNCHGUARD_SCAN_ID="${{ inputs.scan_id }}"
          export LAUNCHGUARD_PROGRESS_PROJECT="$PROGRESS_PROJECT"
          export LAUNCHGUARD_PROGRESS_PROJECT_COUNT="$PROJECT_COUNT"
          export PDF_EXPORT_ENABLED="${{ inputs.pdf_export_enabled }}"
          export ZIP_EXPORT_ENABLED="${{ inputs.zip_export_enabled }}"

          PROGRESS_CALLBACK_URL="$CALLBACK_SECRET_URL"
          if [[ -n "${{ inputs.callback_url }}" ]]; then
            PROGRESS_CALLBACK_URL="${{ inputs.callback_url }}"
          fi
          if [[ -n "$PROGRESS_CALLBACK_URL" && -n "$CALLBACK_SECRET_TOKEN" ]]; then
            export LAUNCHGUARD_PROGRESS_CALLBACK_URL="$PROGRESS_CALLBACK_URL"
            export LAUNCHGUARD_PROGRESS_CALLBACK_TOKEN="$CALLBACK_SECRET_TOKEN"
          fi

          if [[ -n "$REST_BASE_INPUT" ]]; then
            export REST_BASE="$REST_BASE_INPUT"
          fi
          if [[ -n "$CLIENT_LABEL_INPUT" ]]; then
            export REPORT_CLIENT_LABEL="$CLIENT_LABEL_INPUT"
          fi
          export REPORT_BRAND_NAME="${{ inputs.brand_name }}"
          export REPORT_BRAND_LOGO_URL="${{ inputs.brand_logo_url }}"
          export REPORT_BRAND_PRIMARY_COLOR="${{ inputs.brand_primary_color }}"
          export REPORT_BRAND_ACCENT_COLOR="${{ inputs.brand_accent_color }}"
          export REPORT_BRAND_FOOTER_TEXT="${{ inputs.brand_footer_text }}"
          export REPORT_HIDE_BASELINE_BRANDING="${{ inputs.hide_baseline_branding }}"

          send_progress_callback() {
            local current_url="$1"
            if [[ -z "$current_url" || -z "${LAUNCHGUARD_PROGRESS_CALLBACK_URL:-}" || -z "${LAUNCHGUARD_PROGRESS_CALLBACK_TOKEN:-}" ]]; then
              return
            fi

            local payload
            payload=$(jq -cn \
              --arg scan_id "${{ inputs.scan_id }}" \
              --arg current_url "$current_url" \
              '{
                scan_id: $scan_id,
                status: "running",
                summary: {
                  current_url: $current_url,
                  progress: {
                    phase: "scanning",
                    current_url: $current_url
                  }
                }
              }')

            curl -sS -m 8 -X POST "${LAUNCHGUARD_PROGRESS_CALLBACK_URL}" \
              -H "content-type: application/json" \
              -H "x-scan-callback-token: ${LAUNCHGUARD_PROGRESS_CALLBACK_TOKEN}" \
              --data "$payload" >/dev/null || true
          }

          send_terminal_callback() {
            local status="$1"
            local reason="$2"
            if [[ -z "${LAUNCHGUARD_PROGRESS_CALLBACK_URL:-}" || -z "${LAUNCHGUARD_PROGRESS_CALLBACK_TOKEN:-}" ]]; then
              return
            fi
            local payload
            payload=$(jq -cn \
              --arg scan_id "${{ inputs.scan_id }}" \
              --arg status "$status" \
              --arg reason "$reason" \
              '{
                scan_id: $scan_id,
                status: $status,
                summary: {
                  run_state: $status,
                  progress_percent: 100,
                  progress: {
                    phase: $status,
                    percent: 100,
                    last_update_at: (now | todateiso8601)
                  },
                  safety: {
                    mode: "strict",
                    triggered: true,
                    reason_code: (if $status == "protected_stopped" then "preflight_site_stress" else "scan_stalled" end),
                    reason_detail: $reason,
                    auto_action: (if $status == "protected_stopped" then "auto_stop" else "mark_stalled" end),
                    triggered_at: (now | todateiso8601)
                  }
                }
              }')

            curl -sS -m 8 -X POST "${LAUNCHGUARD_PROGRESS_CALLBACK_URL}" \
              -H "content-type: application/json" \
              -H "x-scan-callback-token: ${LAUNCHGUARD_PROGRESS_CALLBACK_TOKEN}" \
              --data "$payload" >/dev/null || true
          }

          PREFLIGHT_URL="$TARGET_SINGLE"
          if [[ -z "$PREFLIGHT_URL" ]]; then
            PREFLIGHT_URL="$REST_BASE_INPUT"
          fi
          if [[ -n "$PREFLIGHT_URL" ]]; then
            PREFLIGHT_CODE=$(curl -sS -o /tmp/baseline-preflight-body.txt -w "%{http_code}" --max-time 12 --connect-timeout 5 "$PREFLIGHT_URL" || echo "000")
            PREFLIGHT_TIME=$(curl -sS -o /dev/null -w "%{time_total}" --max-time 12 --connect-timeout 5 "$PREFLIGHT_URL" || echo "12.000")
            PREFLIGHT_TIME_INT=$(printf '%s' "$PREFLIGHT_TIME" | awk -F'.' '{print $1}')

            if [[ "$PREFLIGHT_CODE" == "000" || "$PREFLIGHT_CODE" -ge 500 || "$PREFLIGHT_TIME_INT" -ge 8 ]]; then
              PROTECT_REASON="Site preflight failed or was too slow (status=${PREFLIGHT_CODE}, time=${PREFLIGHT_TIME}s). Scan auto-stopped to protect uptime."
              echo "$PROTECT_REASON"
              send_terminal_callback "protected_stopped" "$PROTECT_REASON"
              echo "forced_final_status=protected_stopped" >> "$GITHUB_OUTPUT"
              echo "forced_run_state=protected_stopped" >> "$GITHUB_OUTPUT"
              echo "exit_code=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "Running command: ${CMD[*]}"
          LAST_PROGRESS_URL=""
          "${CMD[@]}" 2>&1 | while IFS= read -r line; do
            echo "$line"
            if [[ "$line" == *"QA: "* ]]; then
              CURRENT_URL=$(printf '%s\n' "$line" | grep -Eo 'https?://[^[:space:]]+' | head -n1 || true)
              CURRENT_URL="${CURRENT_URL%\)}"
              if [[ -n "$CURRENT_URL" && "$CURRENT_URL" != "$LAST_PROGRESS_URL" ]]; then
                LAST_PROGRESS_URL="$CURRENT_URL"
                send_progress_callback "$CURRENT_URL"
              fi
            fi
          done
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Collect scan summary
        id: collect_summary
        if: always()
        shell: bash
        run: |
          set +e
          REPORT_DIR="reports/${{ inputs.client_name }}"
          if [[ ! -d "$REPORT_DIR" ]]; then
            SUMMARY_JSON='{"generated_at":"","client":"${{ inputs.client_name }}","issues_total":0,"issue_summary_total":0,"issue_severity_counts":{},"issue_category_top":{},"run_state":"missing_reports_dir","report_artifacts_present":{}}'
          else
            SUMMARY_JSON=$(node scripts/ci/collect-scan-summary.js "$REPORT_DIR" "${{ inputs.client_name }}")
          fi
          echo "summary_json=$SUMMARY_JSON" >> "$GITHUB_OUTPUT"
          SUMMARY_B64=$(printf '%s' "$SUMMARY_JSON" | base64 | tr -d '\n')
          echo "summary_b64=$SUMMARY_B64" >> "$GITHUB_OUTPUT"

      - name: Upload report files to Cloudflare R2
        id: upload_r2
        if: always()
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          REPORTS_R2_BUCKET: baseline-reports-dev
        run: |
          set +e
          REPORT_DIR="reports/${{ inputs.client_name }}"
          REPORT_PREFIX=""
          UPLOADED_COUNT=0
          if [[ ! -d "$REPORT_DIR" ]]; then
            echo "report_prefix=$REPORT_PREFIX" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$CLOUDFLARE_API_TOKEN" || -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "R2 upload skipped: missing Cloudflare secrets."
            echo "report_prefix=$REPORT_PREFIX" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          REPORT_PREFIX="scans/${{ inputs.scan_id }}"
          FILES=()

          while IFS= read -r -d '' file; do FILES+=("$file"); done < <(find "$REPORT_DIR/qa_html" -type f -print0 2>/dev/null)
          while IFS= read -r -d '' file; do FILES+=("$file"); done < <(find "$REPORT_DIR/screenshots" -type f -name '*.png' -print0 2>/dev/null)
          while IFS= read -r -d '' file; do FILES+=("$file"); done < <(find "$REPORT_DIR/lighthouse" -type f -print0 2>/dev/null)
          for file in issues.json run_meta.json site_summary.csv url_summary.csv results.csv issues.tsv QA_Report.xlsx QA_Report.pdf "share-${{ inputs.client_name }}-latest.zip"; do
            if [[ -f "$REPORT_DIR/$file" ]]; then
              FILES+=("$REPORT_DIR/$file")
            fi
          done

          if [[ "${#FILES[@]}" -eq 0 ]]; then
            echo "R2 upload skipped: no report files found."
            echo "report_prefix=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for file in "${FILES[@]}"; do
            rel="${file#${REPORT_DIR}/}"
            key="${REPORT_PREFIX}/${rel}"
            if npx wrangler r2 object put "${REPORTS_R2_BUCKET}/${key}" \
              --file "$file" \
              --remote \
              --config services/api-worker/wrangler.toml >/dev/null; then
              UPLOADED_COUNT=$((UPLOADED_COUNT + 1))
            else
              echo "R2 upload failed for: $rel"
            fi
          done

          if [[ "$UPLOADED_COUNT" -eq 0 ]]; then
            echo "report_prefix=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "report_prefix=$REPORT_PREFIX" >> "$GITHUB_OUTPUT"

          HISTORY_FILE="reports/.history/${{ inputs.client_name }}/issues.previous.json"
          HISTORY_KEY="history/${{ inputs.client_name }}/issues.previous.json"
          if [[ -f "$HISTORY_FILE" ]]; then
            if npx wrangler r2 object put "${REPORTS_R2_BUCKET}/${HISTORY_KEY}" \
              --file "$HISTORY_FILE" \
              --remote \
              --config services/api-worker/wrangler.toml >/dev/null; then
              echo "Updated history snapshot: ${HISTORY_KEY}"
            else
              echo "History snapshot upload failed."
            fi
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ inputs.client_name }}-${{ github.run_id }}
          path: reports/${{ inputs.client_name }}/
          if-no-files-found: warn

      - name: Callback Baseline API
        if: always()
        shell: bash
        env:
          CALLBACK_SECRET_URL: ${{ secrets.BASELINE_CALLBACK_URL != '' && secrets.BASELINE_CALLBACK_URL || secrets.LAUNCHGUARD_CALLBACK_URL }}
          CALLBACK_SECRET_TOKEN: ${{ secrets.BASELINE_CALLBACK_TOKEN != '' && secrets.BASELINE_CALLBACK_TOKEN || secrets.LAUNCHGUARD_CALLBACK_TOKEN }}
        run: |
          set +e
          EXIT_CODE="${{ steps.run_qa.outputs.exit_code }}"
          FORCED_STATUS="${{ steps.run_qa.outputs.forced_final_status }}"
          if [[ -z "$EXIT_CODE" ]]; then
            EXIT_CODE="1"
          fi

          FINAL_STATUS="$FORCED_STATUS"

          TARGET_URL="$CALLBACK_SECRET_URL"
          if [[ -n "${{ inputs.callback_url }}" ]]; then
            TARGET_URL="${{ inputs.callback_url }}"
          fi

          if [[ -z "$TARGET_URL" || -z "$CALLBACK_SECRET_TOKEN" ]]; then
            echo "Callback skipped: missing URL or callback token secret."
            exit 0
          fi

          WORKFLOW_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ARTIFACT_NAME="reports-${{ inputs.client_name }}-${{ github.run_id }}"
          ARTIFACT_URL=""

          ARTIFACTS_API="https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts?per_page=100"
          ARTIFACTS_JSON=$(curl -sS "$ARTIFACTS_API" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "User-Agent: baseline-workflow" || echo '{}')

          ARTIFACT_ID=$(printf '%s' "$ARTIFACTS_JSON" | jq -r --arg NAME "$ARTIFACT_NAME" '.artifacts[]? | select(.name == $NAME) | .id' | head -n1)
          if [[ -n "$ARTIFACT_ID" && "$ARTIFACT_ID" != "null" ]]; then
            ARTIFACT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/$ARTIFACT_ID"
          fi

          SUMMARY_JSON=$(printf '%s' '${{ steps.collect_summary.outputs.summary_b64 }}' | base64 --decode 2>/dev/null || true)
          if [[ -z "$SUMMARY_JSON" ]]; then
            SUMMARY_JSON='{}'
          fi
          if ! printf '%s' "$SUMMARY_JSON" | jq -e . >/dev/null 2>&1; then
            SUMMARY_JSON='{}'
          fi
          SUMMARY_RUN_STATE=$(printf '%s' "$SUMMARY_JSON" | jq -r '.run_state // ""' 2>/dev/null || echo "")

          if [[ -z "$FINAL_STATUS" && ( "$SUMMARY_RUN_STATE" == "protected_stopped" || "$SUMMARY_RUN_STATE" == "stalled" ) ]]; then
            FINAL_STATUS="$SUMMARY_RUN_STATE"
          fi
          if [[ -z "$FINAL_STATUS" ]]; then
            FINAL_STATUS="completed"
            if [[ "$EXIT_CODE" != "0" ]]; then
              FINAL_STATUS="failed"
            fi
          fi

          PAYLOAD=$(jq -cn \
            --arg scan_id "${{ inputs.scan_id }}" \
            --arg status "$FINAL_STATUS" \
            --arg workflow_run_id "${{ github.run_id }}" \
            --arg workflow_url "$WORKFLOW_URL" \
            --arg workflow_attempt "${{ github.run_attempt }}" \
            --arg qa_exit_code "$EXIT_CODE" \
            --arg client_name "${{ inputs.client_name }}" \
            --arg client_label "${{ inputs.client_label }}" \
            --arg site_id "${{ inputs.site_id }}" \
            --arg site_url "${{ inputs.site_url }}" \
            --arg artifact_name "$ARTIFACT_NAME" \
            --arg artifact_url "$ARTIFACT_URL" \
            --arg report_r2_prefix "${{ steps.upload_r2.outputs.report_prefix }}" \
            --arg target_url "${{ steps.run_qa.outputs.effective_target_url }}" \
            --arg selected_projects "${{ steps.run_qa.outputs.selected_projects }}" \
            --arg evidence_enabled "${{ steps.run_qa.outputs.effective_evidence_enabled }}" \
            --arg lighthouse_enabled "${{ steps.run_qa.outputs.effective_lighthouse_enabled }}" \
            --arg quick_scan_enabled "${{ steps.run_qa.outputs.effective_quick_scan_enabled }}" \
            --arg responsive_enabled "${{ steps.run_qa.outputs.effective_responsive_enabled }}" \
            --arg viewport_preset "${{ steps.run_qa.outputs.effective_viewport_preset }}" \
            --argjson report_summary "$SUMMARY_JSON" \
            '{
              scan_id: $scan_id,
              status: $status,
              summary: ($report_summary + {
                workflow_run_id: $workflow_run_id,
                workflow_url: $workflow_url,
                workflow_attempt: $workflow_attempt,
                qa_exit_code: $qa_exit_code,
                client_name: $client_name,
                client_label: $client_label,
                site_id: $site_id,
                site_url: $site_url,
                target_url: $target_url,
                scan_options: {
                  evidence_enabled: ($evidence_enabled == "true"),
                  lighthouse_enabled: ($lighthouse_enabled == "true"),
                  quick_scan_enabled: ($quick_scan_enabled == "true"),
                  responsive_enabled: ($responsive_enabled == "true"),
                  viewport_preset: $viewport_preset,
                  selected_projects: (if $selected_projects == "" then [] else ($selected_projects | split(",")) end)
                },
                reports_artifact_name: $artifact_name,
                reports_artifact_url: $artifact_url,
                report_r2_prefix: $report_r2_prefix
              })
            }')

          curl -fsS -X POST "$TARGET_URL" \
            -H "content-type: application/json" \
            -H "x-scan-callback-token: $CALLBACK_SECRET_TOKEN" \
            --data "$PAYLOAD"

      - name: Fail job if QA failed
        if: steps.run_qa.outputs.exit_code != '0' && steps.run_qa.outputs.forced_final_status == ''
        run: |
          echo "QA command exited with code ${{ steps.run_qa.outputs.exit_code }}"
          exit 1
