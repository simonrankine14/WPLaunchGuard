name: LaunchGuard Scan Runner

on:
  workflow_dispatch:
    inputs:
      scan_id:
        description: "Scan ID from LaunchGuard API"
        required: true
        type: string
      site_id:
        description: "Site ID (for traceability)"
        required: false
        default: ""
        type: string
      client_name:
        description: "Client slug used for report folder names"
        required: true
        type: string
      profile:
        description: "QA profile"
        required: true
        default: "client-safe"
        type: choice
        options:
          - client-safe
          - engineering-deep
      single_url:
        description: "Optional single URL override"
        required: false
        default: ""
        type: string
      sitemap_url:
        description: "Optional sitemap URL"
        required: false
        default: ""
        type: string
      form_mode:
        description: "Form submit mode"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - live
      callback_url:
        description: "Callback URL (optional override)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run QA
        id: run_qa
        shell: bash
        env:
          QA_PROFILE: ${{ inputs.profile }}
          FORM_SUBMIT_MODE: ${{ inputs.form_mode }}
          SCREENSHOTS_MODE: off
        run: |
          set +e
          CMD=(npm run qa -- "${{ inputs.client_name }}" --quick)
          if [[ -n "${{ inputs.single_url }}" ]]; then
            CMD+=("--single=${{ inputs.single_url }}")
          fi
          if [[ -n "${{ inputs.sitemap_url }}" ]]; then
            CMD+=("--sitemap=${{ inputs.sitemap_url }}")
          fi
          echo "Running command: ${CMD[*]}"
          "${CMD[@]}"
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ inputs.client_name }}-${{ github.run_id }}
          path: reports/${{ inputs.client_name }}/
          if-no-files-found: warn

      - name: Callback LaunchGuard API
        if: always()
        shell: bash
        env:
          CALLBACK_SECRET_URL: ${{ secrets.LAUNCHGUARD_CALLBACK_URL }}
          CALLBACK_SECRET_TOKEN: ${{ secrets.LAUNCHGUARD_CALLBACK_TOKEN }}
        run: |
          set +e
          EXIT_CODE="${{ steps.run_qa.outputs.exit_code }}"
          if [[ -z "$EXIT_CODE" ]]; then
            EXIT_CODE="1"
          fi

          FINAL_STATUS="completed"
          if [[ "$EXIT_CODE" != "0" ]]; then
            FINAL_STATUS="failed"
          fi

          TARGET_URL="$CALLBACK_SECRET_URL"
          if [[ -n "${{ inputs.callback_url }}" ]]; then
            TARGET_URL="${{ inputs.callback_url }}"
          fi

          if [[ -z "$TARGET_URL" || -z "$CALLBACK_SECRET_TOKEN" ]]; then
            echo "Callback skipped: missing URL or callback token secret."
            exit 0
          fi

          WORKFLOW_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(printf '{"scan_id":"%s","status":"%s","summary":{"workflow_run_id":"%s","workflow_url":"%s","workflow_attempt":"%s","qa_exit_code":"%s","client_name":"%s","site_id":"%s"}}' \
            "${{ inputs.scan_id }}" \
            "$FINAL_STATUS" \
            "${{ github.run_id }}" \
            "$WORKFLOW_URL" \
            "${{ github.run_attempt }}" \
            "$EXIT_CODE" \
            "${{ inputs.client_name }}" \
            "${{ inputs.site_id }}")

          curl -fsS -X POST "$TARGET_URL" \
            -H "content-type: application/json" \
            -H "x-scan-callback-token: $CALLBACK_SECRET_TOKEN" \
            --data "$PAYLOAD"

      - name: Fail job if QA failed
        if: steps.run_qa.outputs.exit_code != '0'
        run: |
          echo "QA command exited with code ${{ steps.run_qa.outputs.exit_code }}"
          exit 1
